version: "3.9"

# Tata agent uses its own PostgreSQL database (tata_agent).
# The agent creates the database automatically on first start using the
# POSTGRES_USER and POSTGRES_PASSWORD from .env (the same credentials
# used by the postgres container).
#
# Required env files:
#   .env      — PostgreSQL credentials and all application settings.
#               Copy .env.example to .env and fill in your values.
#
# Access points:
#   http://localhost:3000  — Web configuration UI (tata-frontend)
#   http://localhost:8000  — FastAPI backend / webhook endpoint (tata-agent)
#                            Visiting http://localhost:8000 in a browser
#                            redirects automatically to the frontend.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tata_agent}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  tata-agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  tata-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://tata-agent:8000
    depends_on:
      - tata-agent
    restart: unless-stopped

volumes:
  pgdata:
