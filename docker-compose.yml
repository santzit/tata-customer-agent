version: "3.9"

# Tata agent uses its own PostgreSQL database (tata_agent).
# The agent creates the database automatically on first start using the master
# Postgres credentials from .env (POSTGRES_MASTER_DSN).
#
# Required env files:
#   .env      — PostgreSQL master credentials and all application settings.
#               Copy .env.example to .env and fill in your values.

services:
  tata-agent:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
