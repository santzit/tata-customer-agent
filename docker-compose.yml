version: "3.9"

# Tata agent relies on the PostgreSQL + pgvector instance that Chatwoot already
# provides.  Set POSTGRES_DSN in your .env to point at that database.
# The agent does NOT start its own Postgres container.

services:
  tata-agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped

  tata-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://tata-agent:8000
    depends_on:
      - tata-agent
    restart: unless-stopped
