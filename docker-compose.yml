version: "3.9"

# Tata agent — single container serves both the FastAPI backend (webhook/API)
# and the Next.js web UI as static files, all on port 8000.
#
# Required:
#   .env — PostgreSQL credentials and application settings.
#           Copy .env.example to .env and fill in your values.
#
# Access:
#   http://localhost:8000       — Web UI (Next.js static export)
#   http://localhost:8000/api/  — REST API
#   http://localhost:8000/webhook — Chatwoot webhook

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-tata_agent}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  tata-agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:

