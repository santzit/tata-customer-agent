name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Run Tata agent tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tata_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tata_agent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --tb=short -v -k "not TestLiveSimulations"
        env:
          # Real PostgreSQL/pgvector service (see services.postgres above).
          # DB integration tests (ConversationMemory, PgVectorStore) run against
          # this container; they skip gracefully when POSTGRES_DSN is not set.
          POSTGRES_DSN: "postgresql://postgres:postgres@localhost:5432/tata_agent"

      - name: Run tests + OpenAI
        run: pytest --tb=short -v -s -k "TestLiveSimulations"
        env:
          # GitHub Actions secret
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # GitHub Actions variables (set in repository Settings → Variables)
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          OPENAI_API_ENDPOINT: ${{ vars.OPENAI_API_ENDPOINT }}
          EMBEDDING_MODEL_SMALL: ${{ vars.EMBEDDING_MODEL_SMALL }}
          # Real PostgreSQL/pgvector service (see services.postgres above)
          POSTGRES_DSN: "postgresql://postgres:postgres@localhost:5432/tata_agent"
