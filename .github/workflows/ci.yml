name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Run Tata agent tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --tb=short -v
        env:
          # GitHub Actions secret
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # GitHub Actions variables (set in repository Settings → Variables)
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          OPENAI_API_ENDPOINT: ${{ vars.OPENAI_API_ENDPOINT }}
          EMBEDDING_MODEL_SMALL: ${{ vars.EMBEDDING_MODEL_SMALL }}
          # Dummy values for services that are mocked in all other tests
          CHATWOOT_API_TOKEN: "test-token"
          POSTGRES_DSN: "postgresql://postgres:postgres@localhost:5432/tata_agent"
