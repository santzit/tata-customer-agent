name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Run Tata agent tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --tb=short -v
        env:
          # Real key used by test_message_simulations.py (live OpenAI calls).
          # Tests in that file are skipped automatically when the secret is absent.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Dummy values for services that are mocked in all other tests
          CHATWOOT_API_TOKEN: "test-token"
          QDRANT_URL: "http://localhost:6333"
